<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>¡Neta! ¡Así se habla inglés!</title>

  <style>
    body {
      margin: 0;
      background: #ffffff;
      color: #222222;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.7;
    }

    .page {
      max-width: 520px;
      margin: 0 auto;
      padding: 72px 20px;
      text-align: center;
    }

    .cover {
      max-width: 240px;
      width: 100%;
      margin: 0 auto 48px;
      display: block;
      border-radius: 4px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.15);
    }

    h1 {
      font-size: 2.1rem;
      font-weight: 600;
      line-height: 1.25;
      margin-bottom: 20px;
    }

    p {
      font-size: 1.05rem;
      margin-bottom: 36px;
      color: #444444;
    }

    .cta {
      display: inline-block;
      padding: 16px 36px;
      font-size: 1.05rem;
      font-weight: 600;
      color: #ffffff;
      background: #111111;
      border-radius: 8px;
      text-decoration: none;
    }

    .cta:hover {
      opacity: 0.9;
    }

    .note {
      margin-top: 14px;
      font-size: 0.9rem;
      color: #666666;
    }

    footer {
      margin-top: 96px;
      font-size: 0.85rem;
      color: #777777;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 1.9rem;
      }
    }
  </style>
</head>

<body>
  <main class="page">

    <!-- BOOK COVER -->
    <img src="neta-asi-se-habla-ingles.jpg" alt="Description of image">


    <!-- HEADLINE -->
    <h1>Improve your English the fun way!</h1>

    <!-- SHORT DESCRIPTION -->
    <p>
      A practical English book for Spanish speakers who want to move beyond textbook rules and understand everyday, natural English.
    </p>

    <!-- CTA -->
    <a
      class="cta"
      href="https://www.amazon.com/dp/B0GDYX1P31"
      target="_blank"
      rel="noopener noreferrer"
    >
      Buy on Amazon
    </a>

    <div class="note">
      Paperback and Kindle available. Secure checkout on Amazon.
    </div>

    <footer>
      <p>
        Amazon handles payment, shipping, and customer support.
      </p>
    </footer>

  </main>
</body>
</html>
